{% extends "base.html" %}

{% block title %}{{ brand_name }}{% endblock %}

{% block content %}
<div class="landing-container">
  <div class="landing-title">{{ brand_name }}</div>
  <form class="landing-form" method="post" action="/redeem" onsubmit="var c=this.querySelector('[name=code]'); c.value=c.value.trim();">
    <input
      type="text"
      class="text-field"
      name="code"
      placeholder="Enter your license or gift code"
      autofocus
    >
    <button type="submit" class="btn btn-accent">Redeem</button>
    {% if let Some(error) = error %}
      <div class="error-message">{{ error }}</div>
    {% endif %}
  </form>
</div>
{% endblock %}
