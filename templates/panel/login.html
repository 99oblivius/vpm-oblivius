{% extends "base.html" %}

{% block title %}Admin Login{% endblock %}

{% block content %}
<div class="landing-container">
  <div class="landing-title">Admin Login</div>
  <form class="landing-form" method="post" action="/panel/login" autocomplete="on">
    <input
      type="text"
      class="text-field"
      id="admin-username"
      name="username"
      placeholder="Username"
      autocomplete="username"
      autofocus
    >
    <input
      type="password"
      class="text-field"
      id="admin-password"
      name="password"
      placeholder="Password"
      autocomplete="current-password"
    >
    <button class="btn btn-accent" type="submit">Login</button>
    {% if let Some(error) = error %}
      <div class="error-message">{{ error }}</div>
    {% endif %}
  </form>
</div>
{% endblock %}
