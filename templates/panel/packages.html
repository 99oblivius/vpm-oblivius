{% extends "base.html" %}

{% block title %}Packages - Admin - Oblivius{% endblock %}

{% block content %}
<div class="panel-page">
  <div class="panel-header">
    <div class="nav-links">
      <fluent-button appearance="accent" onclick="window.location.href='/panel/packages'">Packages</fluent-button>
      <fluent-button appearance="stealth" onclick="window.location.href='/panel/licenses'">Licenses</fluent-button>
      <fluent-button appearance="stealth" onclick="window.location.href='/panel/markets'">Markets</fluent-button>
    </div>
    <div class="nav-actions">
      <form method="post" action="/panel/logout" style="display:inline;">
        <fluent-button appearance="stealth" type="submit">Logout</fluent-button>
      </form>
    </div>
  </div>
  <div class="panel-body">
    <div class="col align-items-center content">
      <h1 class="m-0 mb-4">Packages</h1>

      <fluent-card class="p-4 mb-4" style="max-width:90%;">
        <h3 class="m-0 mb-3">Create Package</h3>
        <form onsubmit="return false;" class="row align-items-center" style="gap:0.5rem;">
          <fluent-text-field
            id="create-package-name"
            name="name"
            placeholder="Package name"
            appearance="outline"
            autocomplete="section-createpkg one-time-code"
            style="flex:1;"
          ></fluent-text-field>
          <fluent-button appearance="accent" onclick="
            var name = this.closest('form').querySelector('[name=name]').value;
            if(!name) return;
            fetch('/api/packages', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({name:name})}).then(function(r) { if(r.ok) location.reload(); else r.text().then(function(t) { alert(t); }); });
          ">Create</fluent-button>
        </form>
      </fluent-card>

      <fluent-card class="packages">
        <fluent-data-grid role="grid" grid-template-columns="1fr 1fr 180px 80px">
          <fluent-data-grid-row row-type="header">
            <fluent-data-grid-cell cell-type="columnheader" grid-column="1">Name</fluent-data-grid-cell>
            <fluent-data-grid-cell cell-type="columnheader" grid-column="2">UID</fluent-data-grid-cell>
            <fluent-data-grid-cell cell-type="columnheader" grid-column="3">Created</fluent-data-grid-cell>
            <fluent-data-grid-cell cell-type="columnheader" grid-column="4"></fluent-data-grid-cell>
          </fluent-data-grid-row>
          {% for pkg in packages %}
          <fluent-data-grid-row>
            <fluent-data-grid-cell grid-column="1">
              <a href="/panel/packages/{{ pkg.uid }}">{{ pkg.name }}</a>
            </fluent-data-grid-cell>
            <fluent-data-grid-cell grid-column="2">
              <span class="badge mono">{{ pkg.uid }}</span>
            </fluent-data-grid-cell>
            <fluent-data-grid-cell grid-column="3">
              <span class="caption2">{{ pkg.created_at }}</span>
            </fluent-data-grid-cell>
            <fluent-data-grid-cell grid-column="4">
              <fluent-button appearance="stealth" size="small" onclick="
                if(confirm('Delete this package?'))
                  fetch('/api/packages/{{ pkg.uid }}', {method:'DELETE'}).then(function(r) { if(r.ok) location.reload(); else r.text().then(function(t) { alert(t); }); });
              ">Delete</fluent-button>
            </fluent-data-grid-cell>
          </fluent-data-grid-row>
          {% endfor %}
        </fluent-data-grid>
      </fluent-card>
    </div>
  </div>
</div>
{% endblock %}
