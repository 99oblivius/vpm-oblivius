{% extends "base.html" %}

{% block title %}Packages - Admin{% endblock %}

{% block content %}
<div class="panel-page">
  <div class="panel-header">
    <div class="nav-links">
      <button class="btn btn-accent" onclick="window.location.href='/panel/packages'">Packages</button>
      <button class="btn btn-stealth" onclick="window.location.href='/panel/licenses'">Licenses</button>
      <button class="btn btn-stealth" onclick="window.location.href='/panel/markets'">Markets</button>
    </div>
    <div class="nav-actions">
      <form method="post" action="/panel/logout" style="display:inline;">
        <button class="btn btn-stealth" type="submit">Logout</button>
      </form>
    </div>
  </div>
  <div class="panel-body">
    <div class="col align-items-center content">
      <h1 class="m-0 mb-4">Packages</h1>

      <div class="card p-4 mb-4" style="max-width:90%;">
        <h3 class="m-0 mb-3">Upload Package</h3>
        <form id="upload-form" onsubmit="return false;" class="row align-items-center" style="gap:0.5rem;">
          <label class="upload-file-label" style="flex:1;">
            <span id="upload-file-text">Choose .zip file</span>
            <input type="file" id="upload-file" accept=".zip" style="display:none;"
              onchange="document.getElementById('upload-file-text').textContent = this.files[0] ? this.files[0].name : 'Choose .zip file';">
          </label>
          <button class="btn btn-accent" id="upload-btn" onclick="uploadPackage()">Upload</button>
        </form>
        <div id="upload-error" class="mt-3 p-3" style="display:none; background:var(--neutral-fill-hover); border-radius:4px; color:var(--error);"></div>
      </div>
<script>
function uploadPackage() {
  var fileInput = document.getElementById('upload-file');
  var btn = document.getElementById('upload-btn');
  var errorDiv = document.getElementById('upload-error');
  var file = fileInput.files[0];

  errorDiv.style.display = 'none';
  if (!file) { alert('Please select a .zip file.'); return; }

  btn.disabled = true;
  var formData = new FormData();
  formData.append('file', file);

  fetch('/api/packages/upload', { method: 'POST', body: formData })
    .then(function(r) {
      if (r.ok) return r.json();
      return r.text().then(function(t) { throw new Error(t); });
    })
    .then(function(data) {
      window.location.href = '/panel/packages/' + data.uid;
    })
    .catch(function(e) {
      btn.disabled = false;
      errorDiv.textContent = e.message || 'Upload failed';
      errorDiv.style.display = 'block';
    });
}
</script>

      <div class="card packages">
        <div class="table-wrap">
          <table class="data-grid">
            <thead>
              <tr>
                <th>Name</th>
                <th>UID</th>
                <th>Created</th>
                <th></th>
              </tr>
            </thead>
            <tbody>
              {% for pkg in packages %}
              <tr>
                <td>
                  <a href="/panel/packages/{{ pkg.uid }}">{{ pkg.display_name }}</a>
                </td>
                <td>
                  <span class="badge mono">{{ pkg.uid }}</span>
                </td>
                <td>
                  <span class="caption2" data-timestamp="{{ pkg.created_at }}">{{ pkg.created_at }}</span>
                </td>
                <td>
                  <button class="btn btn-stealth btn-sm" onclick="
                    if(confirm('Delete this package?'))
                      fetch('/api/packages/{{ pkg.uid }}', {method:'DELETE'}).then(function(r) { if(r.ok) location.reload(); else r.text().then(function(t) { alert(t); }); });
                  ">Delete</button>
                </td>
              </tr>
              {% endfor %}
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
