{% extends "base.html" %}

{% block title %}Admin Dashboard - Oblivius{% endblock %}

{% block content %}
<div class="col align-items-center content">
  <div class="row align-items-center justify-content-between w-100 mt-5 mb-4">
    <h1 class="m-0">Dashboard</h1>
    <form method="post" action="/panel/logout">
      <fluent-button appearance="stealth" type="submit">Logout</fluent-button>
    </form>
  </div>
  <div class="row w-100" style="gap: 1rem;">
    <fluent-card class="p-4 flex-1">
      <h3 class="m-0 mb-2">Packages</h3>
      <p class="caption1">Manage packages and versions</p>
      <fluent-button appearance="accent" class="mt-3" onclick="window.location.href='/panel/packages'">
        Manage Packages
      </fluent-button>
    </fluent-card>
    <fluent-card class="p-4 flex-1">
      <h3 class="m-0 mb-2">Licenses</h3>
      <p class="caption1">Manage licenses and gift codes</p>
      <fluent-button appearance="accent" class="mt-3" onclick="window.location.href='/panel/licenses'">
        Manage Licenses
      </fluent-button>
    </fluent-card>
  </div>
</div>
{% endblock %}
