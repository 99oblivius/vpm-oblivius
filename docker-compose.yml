services:
  vpm:
    build: .
    container_name: vpm-oblivius
    restart: unless-stopped
    ports:
      - "7246:3000"
    volumes:
      - ./data:/app/data
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
